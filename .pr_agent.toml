[pr_reviewer]
require_focused_review = true
require_score_review = false
require_tests_review = true
require_security_review = true
require_can_be_split_review = false
require_estimate_effort_to_review = false

# Increase from default of 3
num_max_findings = 10

# Enable inline code comments in the review
inline_code_comments = true

# Disable persistent comment to force review comments on specific lines
persistent_comment = false

extra_instructions = """
Focus on correctness, bugs, and regression risk. 

CRITICAL - Check for these common Go bugs:
1. Syntax errors in string construction (e.g., CEL expressions, SQL, filters)
2. Missing input validation and sanitization (especially for user-provided strings)
3. Nil pointer dereferences (check map access, interface assertions)
4. Off-by-one errors in loops and array access
5. Missing error checks or improper error handling
6. String escaping issues when building expressions
7. Race conditions and concurrent access to shared data

For this codebase specifically:
- CEL filter expressions
- API changes: check backward compatibility
- Error paths: verify all error cases are handled

Also review for:
- Controller reconciliation logic (idempotency, eventual consistency)
- Kubernetes resource lifecycle (finalizers, deletion, updates)
- Security issues (RBAC, privilege escalation, credential handling)
- Test coverage for error paths and edge cases

Do NOT comment on:
- Code style, formatting, or naming (unless it causes bugs)
- Issues that linters would catch
- Minor optimizations that don't affect correctness
"""

[pr_description]
publish_labels = false
add_original_user_description = true

[pr_code_suggestions]
num_code_suggestions = 6
