name: AI PR Reviewer (Gemini)

on:
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # Run on /review or /improve comments
    if: |
      github.event.issue.pull_request &&
      (startsWith(github.event.comment.body, '/review') || startsWith(github.event.comment.body, '/improve'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      # Step 1: Permission Check (Maintainer only)
      - name: Check User Permission
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api repos/$REPO/collaborators/$COMMENT_USER/permission --jq '.permission')
          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
            echo "permitted=true" >> $GITHUB_OUTPUT
            echo "User $COMMENT_USER has $PERMISSION permission - allowing review"
          else
            echo "permitted=false" >> $GITHUB_OUTPUT
            echo "User $COMMENT_USER has $PERMISSION permission - skipping review"
          fi

      # Step 2: Trigger PR-Agent with Gemini 3.1 Pro
      - name: PR Agent Action
        if: steps.check.outputs.permitted == 'true'
        uses: Codium-ai/pr-agent@main
        env:
          config.model: "gemini/gemini-3.1-pro-preview"
          google_ai_studio.gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          pr_reviewer.inline_code_comments: "true"
          pr_description.publish_labels: "false"
