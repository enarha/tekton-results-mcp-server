name: AI PR Reviewer (Gemini)

on:
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # Only run if it's a Pull Request comment starting with /review
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      # Step 1: Permission Check (Maintainer only)
      - name: Check User Permission
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api repos/$REPO/collaborators/$COMMENT_USER/permission --jq '.permission')
          if [[ "$PERMISSION" == "admin" || "$PERMISSION" == "write" ]]; then
            echo "permitted=true" >> $GITHUB_OUTPUT
            echo "User $COMMENT_USER has $PERMISSION permission - allowing review"
          else
            echo "permitted=false" >> $GITHUB_OUTPUT
            echo "User $COMMENT_USER has $PERMISSION permission - skipping review"
          fi

      # Step 2: Trigger PR-Agent with Gemini
      - name: PR Agent Action
        if: steps.check.outputs.permitted == 'true'
        uses: Codium-ai/pr-agent@main
        env:
          # Configuration for Gemini 2.5 Flash
          config.model: "gemini/gemini-2.5-flash"
          google_ai_studio.gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

          # GitHub Context
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Optional: Custom behavior
          pr_reviews.inline_code_comments: "true"
          pr_description.publish_labels: "false"
