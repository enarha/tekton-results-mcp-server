name: AI PR Reviewer (Gemini)

on:
  issue_comment:
    types: [created]

jobs:
  pr_agent_job:
    # Only run if it's a Pull Request comment starting with /ai-review
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/ai-review')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
      # Step 1: Permission Check (Maintainer only)
      - name: Check User Permission
        id: check
        uses: lannonbr/repo-permission-check-action@2.0.0
        with:
          permission: write
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 2: Trigger PR-Agent with Gemini
      - name: PR Agent Action
        if: steps.check.outputs.has-permission == 'true'
        uses: Codium-ai/pr-agent@main
        env:
          # Configuration for Gemini
          config.model: "gemini/gemini-1.5-flash"
          google_ai_studio.gemini_api_key: ${{ secrets.GEMINI_API_KEY }}

          # GitHub Context
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

          # Command to execute
          PR_AGENT_COMMAND: "/review"

          # Optional: Custom behavior
          pr_reviews.inline_code_comments: "true"
          pr_description.publish_labels: "false"
